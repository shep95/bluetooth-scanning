<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>#houseofasher · Screen Relay</title>
  <style>
    :root { --bg:#0a0e14; --cyan:#00e5ff; --green:#39ff14; --text:#c8d6e5; --muted:#6b7c93; --border:#1e2a3a; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:Segoe UI,system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:1rem; }
    h1 { font-size:1rem; color:var(--cyan); letter-spacing:.08em; margin:0 0 .5rem; }
    .meta { font-size:.85rem; color:var(--muted); margin-bottom:1rem; }
    button { background:#1a2433; color:var(--text); border:1px solid var(--border); padding:.65rem 1rem; border-radius:8px; font-size:1rem; cursor:pointer; width:100%; margin:.35rem 0; }
    button.primary { border-color:var(--cyan); color:var(--cyan); }
    button.danger { border-color:#ff3355; color:#ff3355; }
    #preview { width:100%; max-height:40vh; background:#000; border-radius:8px; margin:.75rem 0; display:none; }
    #status { font-size:.8rem; padding:.5rem; border-radius:6px; background:#0d1219; border:1px solid var(--border); margin-top:.5rem; }
    #status.live { border-color:var(--green); color:var(--green); }
    code { color:var(--cyan); font-size:.85em; word-break:break-all; }
  </style>
</head>
<body>
  <h1>#houseofasher SCREEN RELAY</h1>
  <p class="meta">Consent required — your browser will ask which screen or window to share. Frames post to this PC only.</p>
  <p class="meta">Session: <code id="sessionLabel">—</code></p>

  <button id="startBtn" class="primary" type="button">START SHARE</button>
  <button id="stopBtn" class="danger" type="button" disabled>STOP SHARE</button>

  <video id="preview" autoplay playsinline muted></video>
  <div id="status">Idle — tap START SHARE and pick your screen or window.</div>

  <script src="/dist/screen-relay.js"></script>
</body>
</html>
